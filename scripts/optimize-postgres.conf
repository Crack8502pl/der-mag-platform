# Optymalizacja PostgreSQL dla systemów z ograniczoną RAM (np. 2-4 GB)

# Shared memory (25% dostępnej RAM)
shared_buffers = 256MB

# Effective cache (50% dostępnej RAM)
effective_cache_size = 1GB

# Maintenance work memory
maintenance_work_mem = 64MB

# Work memory per query
work_mem = 4MB

# WAL buffers
wal_buffers = 8MB

# Checkpoint settings (mniej I/O)
checkpoint_completion_target = 0.9
checkpoint_timeout = 15min

# Autovacuum (zoptymalizowany)
autovacuum_max_workers = 2
autovacuum_naptime = 30s
